    const allWords = rawData.split('|').map(s=>{const [en,zh]=s.split(':');return {en,zh};});

    const AudioEngine = {
        ctx: null, init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(f, t, d, v) { if(!this.ctx) return; const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type=t; o.frequency.setValueAtTime(f, this.ctx.currentTime); if(t==='square') o.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime+d); g.gain.setValueAtTime(v, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0, this.ctx.currentTime+d); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+d); },
        shoot() { this.play(800, 'square', 0.1, 0.1); }, hit() { this.play(400, 'triangle', 0.2, 0.2); }, miss() { this.play(150, 'sine', 0.4, 0.15); }
    };

    const mCanvas = document.getElementById('matrixCanvas');
    const mCtx = mCanvas.getContext('2d');
    let drops = [];
    function initMatrix() { mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight; drops = Array(Math.floor(mCanvas.width/20)).fill(1); }
    function drawMatrix() { mCtx.fillStyle = "rgba(5, 0, 10, 0.15)"; mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height); mCtx.fillStyle = "#B8860B"; mCtx.font = "15px monospace"; drops.forEach((y, i) => { const c = String.fromCharCode(0x30A0 + Math.random() * 96); mCtx.fillText(c, i * 20, y * 20); if (y * 20 > mCanvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }

    const gCanvas = document.getElementById('gameCanvas');
    const gCtx = gCanvas.getContext('2d');
    const wordInput = document.getElementById('word-input');
    let gameSpeed = 0.65, currentTask = [], balloons = [], lasers = [], hits = 0, misses = 0, processed = 0, gameActive = false, finalHistory = [];

    function init() {
        const shuffled = [...allWords].sort(() => 0.5 - Math.random());
        currentTask = shuffled.slice(0, 10);
        document.getElementById('preview-grid').innerHTML = currentTask.map(w => `<div class="preview-item"><span>${w.en}</span> <b>${w.zh}</b></div>`).join('');
        initMatrix(); resize();
    }
    function resize() { gCanvas.width = window.innerWidth; gCanvas.height = window.innerHeight; }
    window.addEventListener('resize', () => { initMatrix(); resize(); });
    function setDiff(s, btn) { gameSpeed = s; document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    function startGame() {
        if(!AudioEngine.ctx) AudioEngine.init();
        if(AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('input-area').style.display = 'block';
        gameActive = true; wordInput.focus();
        hits=0; misses=0; processed=0; balloons=[]; lasers=[]; finalHistory=[]; updateUI();
        let spawned = 0;
        const interval = setInterval(() => {
            if (spawned < 10 && gameActive) {
                balloons.push({ en: currentTask[spawned].en, zh: currentTask[spawned].zh, x: Math.random() * (window.innerWidth - 180) + 90, y: -100, dead: false });
                spawned++;
            } else { clearInterval(interval); }
        }, 1800);
    }

    wordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = wordInput.value.trim(); // 逆向校验中文
            AudioEngine.shoot();
            const target = balloons.find(b => b.zh === val && !b.dead);
            if (target) {
                lasers.push({ x: target.x, y: target.y, life: 10 });
                target.dead = true; hits++; processed++; finalHistory.push({ ...target, status: '拦截成功' });
                AudioEngine.hit(); updateUI();
            }
            wordInput.value = '';
        }
    });

    function updateUI() { document.getElementById('hit-count').innerText = hits; document.getElementById('miss-count').innerText = misses; }

    function gameLoop() {
        drawMatrix();
        gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
        if (gameActive) {
            const cx = gCanvas.width / 2, cy = gCanvas.height - 100;
            gCtx.fillStyle = "#D4AF37"; gCtx.beginPath(); gCtx.moveTo(cx, cy); gCtx.lineTo(cx-40, cy+50); gCtx.lineTo(cx+40, cy+50); gCtx.fill();
            gCtx.fillRect(cx-3, cy-25, 6, 40);
            for (let i = balloons.length - 1; i >= 0; i--) {
                const b = balloons[i];
                if (!b.dead) {
                    b.y += gameSpeed;
                    gCtx.fillStyle = "rgba(212, 175, 55, 0.9)"; gCtx.beginPath(); gCtx.arc(b.x, b.y, 45, 0, Math.PI * 2); gCtx.fill();
                    gCtx.strokeStyle = "#D4AF37"; gCtx.lineWidth=2; gCtx.strokeRect(b.x-15, b.y+50, 30, 20);
                    gCtx.fillStyle = "black"; gCtx.font = "bold 18px Arial"; gCtx.textAlign = "center"; gCtx.fillText(b.en, b.x, b.y + 7);
                    if (b.y > gCanvas.height - 50) { b.dead = true; misses++; processed++; finalHistory.push({ ...b, status: '漏掉逃逸' }); AudioEngine.miss(); updateUI(); }
                } else { balloons.splice(i, 1); }
            }
            lasers.forEach((l, i) => {
                gCtx.strokeStyle = "white"; gCtx.lineWidth = l.life; gCtx.beginPath(); gCtx.moveTo(gCanvas.width/2, gCanvas.height-100); gCtx.lineTo(l.x, l.y); gCtx.stroke();
                l.life -= 2; if(l.life <= 0) lasers.splice(i, 1);
            });
            if (processed === 10 && lasers.length === 0) { gameActive = false; setTimeout(showReport, 800); }
        }
        requestAnimationFrame(gameLoop);
    }

    function showReport() {
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('report-grid').innerHTML = finalHistory.map(m => `<div class="report-row"><span class="${m.status === '拦截成功' ? 'res-hit' : 'res-miss'}">[${m.status}]</span><b>${m.en}</b><span>${m.zh}</span></div>`).join('');
    }
    init(); requestAnimationFrame(gameLoop);
</script>
